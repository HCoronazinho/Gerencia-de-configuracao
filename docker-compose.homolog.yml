services:
postgres:
image: postgres:16
container_name: controle_financeiro_db_homolog
restart: always

```
environment:
  POSTGRES_USER: henrique
  POSTGRES_PASSWORD: 123456
  POSTGRES_DB: controle_financeiro

ports:
  - "5433:5432"

volumes:
  - postgres_data_homolog:/var/lib/postgresql/data

networks:
  - rede_homolog
```

app:
build: .
container_name: controle_financeiro_app_homolog
restart: always

```
ports:
  - "3001:3000"

env_file:
  - .env

depends_on:
  - postgres

networks:
  - rede_homolog
```

volumes:
postgres_data_homolog:

networks:
rede_homolog:
