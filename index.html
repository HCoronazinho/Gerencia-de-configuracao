<!DOCTYPE html>
<html>
<head>
  <title>Controle Financeiro</title>
</head>
<body>

  <h2>Novo Lançamento</h2>

  <form id="form">
    <input type="text" id="descricao" placeholder="Descrição" required>
    <input type="date" id="data" required>
    <input type="number" id="valor" placeholder="Valor" required>

    <select id="tipo">
      <option value="RECEITA">Receita</option>
      <option value="DESPESA">Despesa</option>
    </select>

    <select id="situacao">
      <option value="PAGO">Pago</option>
      <option value="PENDENTE">Pendente</option>
    </select>

    <button type="submit">Salvar</button>
  </form>

  <hr>

  <h2>Lista de Lançamentos</h2>
  <h2>Filtros</h2>

<label>Data início:</label>
<input type="date" id="dataInicio">

<label>Data fim:</label>
<input type="date" id="dataFim">

<label>Situação:</label>
<select id="situacaoFiltro">
  <option value="TODOS">Todos</option>
  <option value="PAGO">Pago</option>
  <option value="PENDENTE">Pendente</option>
</select>

<button type="button" onclick="filtrar()">Filtrar</button>
<button type="button" onclick="gerarPDF()">Gerar PDF</button>
<tbody id="tabela"></tbody>

  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Descrição</th>
        <th>Data</th>
        <th>Valor</th>
        <th>Tipo</th>
        <th>Situação</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <script>
  let editandoId = null;

  function montarQuery() {
    const dataInicio = document.getElementById("dataInicio").value;
    const dataFim = document.getElementById("dataFim").value;
    const situacao = document.getElementById("situacaoFiltro").value;

    const params = new URLSearchParams();

    if (dataInicio) params.append("dataInicio", dataInicio);
    if (dataFim) params.append("dataFim", dataFim);
    if (situacao && situacao !== "TODOS") params.append("situacao", situacao);

    return params.toString();
  }

  function carregar() {
    const query = montarQuery();
    const url = query ? `/lancamentos?${query}` : "/lancamentos";

    console.log("Carregando:", url);

    fetch(url)
      .then(res => res.json())
      .then(data => {
        const tabela = document.getElementById("tabela");
        tabela.innerHTML = "";

        data.forEach(l => {
          const dataFormatada = (l.data_lancamento || "").split("T")[0];

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${l.id}</td>
            <td>${l.descricao}</td>
            <td>${dataFormatada}</td>
            <td>${l.valor}</td>
            <td>${l.tipo_lancamento}</td>
            <td>${l.situacao}</td>
            <td>
              <button type="button" onclick="prepararEdicao(${l.id}, '${l.descricao}', '${dataFormatada}', ${l.valor}, '${l.tipo_lancamento}', '${l.situacao}')">
                Editar
              </button>
              <button type="button" onclick="excluir(${l.id})">Excluir</button>
            </td>
          `;
          tabela.appendChild(row);
        });
      })
      .catch(err => {
        console.error("Erro ao carregar lançamentos:", err);
      });
  }

  function filtrar() {
    console.log("clicou filtrar");
    carregar();
  }

  function gerarPDF() {
    const query = montarQuery();
    const url = query ? `/relatorio/pdf?${query}` : "/relatorio/pdf";
    window.open(url, "_blank");
  }

  document.getElementById("form").addEventListener("submit", e => {
    e.preventDefault();

    const dados = {
      descricao: document.getElementById("descricao").value,
      data_lancamento: document.getElementById("data").value,
      valor: parseFloat(document.getElementById("valor").value),
      tipo_lancamento: document.getElementById("tipo").value,
      situacao: document.getElementById("situacao").value
    };

    const metodo = editandoId === null ? "POST" : "PUT";
    const url = editandoId === null ? "/lancamentos" : `/lancamentos/${editandoId}`;

    fetch(url, {
      method: metodo,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(dados)
    })
    .then(res => res.json())
    .then(() => {
      limparForm();
      carregar();
    })
    .catch(err => {
      console.error(err);
      alert("Erro ao salvar");
    });
  });

  function prepararEdicao(id, descricao, data, valor, tipo, situacao) {
    document.getElementById("descricao").value = descricao;
    document.getElementById("data").value = data;
    document.getElementById("valor").value = valor;
    document.getElementById("tipo").value = tipo;
    document.getElementById("situacao").value = situacao;
    editandoId = id;
  }

  function excluir(id) {
    if (!confirm("Deseja excluir?")) return;

    fetch(`/lancamentos/${id}`, { method: "DELETE" })
      .then(() => carregar())
      .catch(err => console.error(err));
  }

  function limparForm() {
    document.getElementById("form").reset();
    editandoId = null;
  }

  carregar();
</script>

</body>
</html>
